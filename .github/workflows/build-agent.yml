name: Build Apollo Agent

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # requis pour créer/modifier les GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: apollo-agent.exe
          - os: ubuntu-latest
            artifact: apollo-agent
          # macOS: compile en local (on a la machine)

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust module (maturin)
        run: |
          pip install maturin
          cd apollo_io_native
          maturin build --release
        shell: bash

      - name: Install Rust wheel
        run: pip install apollo_io_native/target/wheels/*.whl
        shell: bash

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt
        shell: bash

      - name: Build with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile \
            --name "${{ matrix.artifact }}" \
            --add-data "agent/ui/static:agent/ui/static" \
            --add-data "agent/config:agent/config" \
            --hidden-import asyncpg \
            --hidden-import asyncpg.pgproto.pgproto \
            --hidden-import asyncpg.protocol.protocol \
            --hidden-import aiomysql \
            --hidden-import motor \
            --hidden-import aioodbc \
            --hidden-import msal \
            --hidden-import aiohttp \
            --hidden-import pybloom_live \
            --hidden-import openpyxl \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import httpx \
            --hidden-import pydantic \
            --hidden-import ldap3 \
            --hidden-import pyasn1 \
            agent/main.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: apollo-agent-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}
          retention-days: 10

  release:
    needs: build
    runs-on: ubuntu-latest
    # Uniquement sur push de tag (pas sur workflow_dispatch manuel sans tag)
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Compute SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name "apollo-agent" -o -name "apollo-agent.exe" \) | sort | while read f; do
            sha256sum "$f" | sed 's|\./[^/]*/||'
          done > ../SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "APOLLO Data Auditor ${{ github.ref_name }}"
          body: |
            ## APOLLO Data Auditor ${{ github.ref_name }}

            ### Téléchargement

            | OS      | Fichier              |
            |---------|----------------------|
            | Windows | `apollo-agent.exe`   |
            | Linux   | `apollo-agent`       |
            | macOS   | `apollo-agent-macos` |

            > **macOS** : binaire uploadé manuellement après build local.

            Vérifier l'intégrité : comparer le hash de votre fichier avec `SHA256SUMS.txt`
            ```
            # Linux / macOS
            sha256sum apollo-agent
            # Windows (PowerShell)
            Get-FileHash apollo-agent.exe
            ```

            Voir [CHANGELOG.md](CHANGELOG.md) pour le détail des changements.
          files: |
            artifacts/apollo-agent-windows-latest/apollo-agent.exe
            artifacts/apollo-agent-ubuntu-latest/apollo-agent
            SHA256SUMS.txt
          # macOS absent du CI — uploadé manuellement via : gh release upload <tag> apollo-agent-macos
          fail_on_unmatched_files: false
          make_latest: true
