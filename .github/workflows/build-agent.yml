name: Build Apollo Agent

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: apollo-agent.exe
          - os: ubuntu-latest
            artifact: apollo-agent
          # macOS: compile en local (on a la machine)

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust module (maturin)
        run: |
          pip install maturin
          cd apollo_io_native
          maturin build --release
        shell: bash

      - name: Install Rust wheel
        run: pip install apollo_io_native/target/wheels/*.whl
        shell: bash

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt
        shell: bash

      - name: Build with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile \
            --name "${{ matrix.artifact }}" \
            --add-data "agent/ui/static:agent/ui/static" \
            --add-data "agent/config:agent/config" \
            --hidden-import asyncpg \
            --hidden-import asyncpg.pgproto.pgproto \
            --hidden-import asyncpg.protocol.protocol \
            --hidden-import aiomysql \
            --hidden-import motor \
            --hidden-import aioodbc \
            --hidden-import msal \
            --hidden-import aiohttp \
            --hidden-import pybloom_live \
            --hidden-import openpyxl \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import httpx \
            --hidden-import pydantic \
            agent/main.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apollo-agent-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}
          retention-days: 90

  checksum:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compute SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name "apollo-agent" -o -name "apollo-agent.exe" \) | sort | while read f; do
            sha256sum "$f" | sed 's|\./[^/]*/||'
          done > ../SHA256SUMS.txt
          echo ""
          echo "=== SHA256SUMS.txt ==="
          cat ../SHA256SUMS.txt

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: SHA256SUMS.txt
          retention-days: 90

      # NOTE: Les binaires sont distribues exclusivement via aiia-tech.com
      # SHA256SUMS.txt doit etre deploye sur aiia-tech.com/download/SHA256SUMS.txt
      # en meme temps que les binaires, apres validation manuelle.
