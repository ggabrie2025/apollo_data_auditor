name: Build Apollo Agent

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: apollo-agent.exe
          - os: ubuntu-latest
            artifact: apollo-agent
          # macOS: compile en local (on a la machine)

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install unixodbc

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust module (maturin)
        run: |
          pip install maturin
          cd apollo_io_native
          maturin build --release
        shell: bash

      - name: Install Rust wheel
        run: pip install apollo_io_native/target/wheels/*.whl
        shell: bash

      - name: Install Python dependencies
        run: pip install -r agent/requirements.txt
        shell: bash

      - name: Build with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile \
            --name "${{ matrix.artifact }}" \
            --add-data "agent/ui/static:agent/ui/static" \
            --add-data "agent/config:agent/config" \
            --hidden-import asyncpg \
            --hidden-import aiomysql \
            --hidden-import motor \
            --hidden-import aioodbc \
            --hidden-import msal \
            --hidden-import aiohttp \
            --hidden-import pybloom_live \
            --hidden-import openpyxl \
            --hidden-import uvicorn \
            --hidden-import fastapi \
            --hidden-import httpx \
            --hidden-import pydantic \
            agent/main.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apollo-agent-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apollo-agent-windows-latest/apollo-agent.exe
            apollo-agent-ubuntu-latest/apollo-agent
          generate_release_notes: true
